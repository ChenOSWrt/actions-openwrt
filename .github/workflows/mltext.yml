name: test-scan

on:
  workflow_dispatch:

jobs:
  test-scan:
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.scan.outputs.devices }}
    steps:
      - uses: actions/checkout@v6

      - name: 扫描 configs 目录
        id: scan
        run: |
          # 检查目录是否存在
          [ -d configs ] || { echo "❌ configs 目录不存在" && exit 1; }
          
          # 获取所有设备名称
          devices=$(ls configs/*.config 2>/dev/null | xargs -r basename -s .config)
          
          # 没有设备则退出
          [ -z "$devices" ] && { echo "❌ configs 目录为空，终止编译！" && exit 1; }
          
          # 生成 JSON 矩阵给 GitHub Actions
          json=$(echo "$devices" | jq -R . | jq -cs .)
          
          # 输出结果
          echo "devices=$json" >> $GITHUB_OUTPUT
          echo "✅ 扫描完成，设备列表：$json"

      - name: 打印最终设备列表
        run: |
          echo "最终设备列表: ${{ steps.scan.outputs.devices }}"
