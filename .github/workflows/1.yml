name: Download Compile Cache
on:
  workflow_dispatch:

env:
  CACHE_KEY: Linux-sync-nanopc_t6-25964126010
  CACHE_SYNC: ${{ github.workspace }}/chenos
  OPENWRT_DIR: ${{ github.workspace }}/openwrt

jobs:
  restore-and-download:
    runs-on: ubuntu-latest
    steps:
      - name: Check current directory
        run: |
          pwd
          ls -la

      - name: Restore compile cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.CACHE_KEY }}
          path: |
            ${{ env.CACHE_SYNC }}/dl
            ${{ env.CACHE_SYNC }}/staging_dir
            ${{ env.CACHE_SYNC }}/ccache
          restore-keys: |
            Linux-sync-nanopc_t6-
          fail-on-cache-miss: false

      - name: Check cache restore status
        run: |
          echo "Cache hit? ${{ steps.cache-restore.outputs.cache-hit }}"
          echo "Cache restore output:"
          echo "${{ steps.cache-restore.outputs.* }}"
          echo "=== CACHE_SYNC dir ==="
          ls -la ${{ env.CACHE_SYNC }} || echo "CACHE_SYNC dir not found"
          echo "=== dl dir ==="
          ls -la ${{ env.CACHE_SYNC }}/dl || echo "dl dir not found"
          echo "=== staging_dir ==="
          ls -la ${{ env.CACHE_SYNC }}/staging_dir || echo "staging_dir not found"
          echo "=== ccache dir ==="
          ls -la ${{ env.CACHE_SYNC }}/ccache || echo "ccache dir not found"

      - name: Sync cache back to openwrt dir
        if: steps.cache-restore.outputs.cache-hit == 'true'
        run: |
          mkdir -p ${{ env.OPENWRT_DIR }}
          if [ -d "${{ env.CACHE_SYNC }}/dl" ]; then
            rsync -av "${{ env.CACHE_SYNC }}/dl/" "${{ env.OPENWRT_DIR }}/dl/"
          fi
          if [ -d "${{ env.CACHE_SYNC }}/staging_dir" ]; then
            rsync -av "${{ env.CACHE_SYNC }}/staging_dir/" "${{ env.OPENWRT_DIR }}/staging_dir/"
          fi
          if [ -d "${{ env.CACHE_SYNC }}/ccache" ]; then
            mkdir -p "${{ env.OPENWRT_DIR }}/.ccache"
            rsync -av "${{ env.CACHE_SYNC }}/ccache/" "${{ env.OPENWRT_DIR }}/.ccache/"
          fi

      - name: Debug - Check openwrt dir
        if: steps.cache-restore.outputs.cache-hit == 'true'
        run: |
          ls -la ${{ env.OPENWRT_DIR }}
          du -sh ${{ env.OPENWRT_DIR }}

      - name: Upload full cache as artifact
        if: steps.cache-restore.outputs.cache-hit == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: openwrt-compile-cache
          path: ${{ env.OPENWRT_DIR }}/
          retention-days: 30
