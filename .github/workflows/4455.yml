# 工作流名称：测试 GitHub 工作区路径
name: Test GitHub Workspace

# 触发方式：手动点击运行（最适合测试）
on:
  workflow_dispatch:

# 执行任务
jobs:
  check-path:
    runs-on: ubuntu-latest  # 用Ubuntu runner（路径最清晰）
    steps:
      # 步骤1：签出仓库代码（可选，不签出也能查路径）
      - name: Checkout code
        uses: actions/checkout@v6

      # 步骤2：打印工作区路径 + 目录信息
      - name: Print workspace path
        run: |
          # 打印 github.workspace 变量
          echo "✅ github.workspace 路径 = ${{ github.workspace }}"
          
          # 等价写法（环境变量）
          echo "✅ 环境变量 GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          
          # 打印当前所在目录（和上面路径完全一致）
          echo "✅ 当前工作目录 = $(pwd)"
          
          # 列出目录里的文件（验证是你的仓库根目录）
          echo -e "\n📂 工作区目录内容："
          ls -la
