name: 清理测试（工作流+Releases）
on: workflow_dispatch

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: 清理旧工作流记录
        run: |
          gh run list --workflow "测试Release" --limit 100 --json databaseId -q '.[2:][] | .databaseId' | xargs -n 1 gh run delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧Releases
        run: |
          TAGS=$(gh release list --json tagName --jq '.[2:][] | .tagName')
          for tag in $TAGS; do
            echo "正在删除: $tag"
            gh release delete "$tag" --yes  # 删除 Release
            git push origin --delete "$tag" # 删除 Git 标签（关键！）
          done
          # gh release list --json tagName --jq '.[2:][] | .tagName' | xargs -r -n 1 gh release delete --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
