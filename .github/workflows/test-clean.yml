name: 清理测试（工作流+Releases）
on: workflow_dispatch

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: 清理旧工作流记录
        if: always()
        run: |
          # 获取需要删除的工作流记录（保留最新2个）
          gh run list --workflow "清理测试（工作流+Releases）" --limit 100 \
            --json databaseId -q '.[2:][] | .databaseId' \
            | xargs -n 1 gh run delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧Releases
        run: |
          # 获取需要删除的标签列表（保留最新2个）
          TAGS=$(gh release list --json tagName --jq '.[2:][] | .tagName')
          for tag in $TAGS; do
            echo "正在删除: $tag"
            # 删除 Release
            gh release delete "$tag" --yes
            # 删除 Tags
            git push origin --delete "$tag"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
