name: 最终清理测试（无报错版）
on: workflow_dispatch

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      # 清理工作流记录（保留最新2条）
      - name: 删除旧工作流记录
        run: |
          wid=$(gh workflow list --json name,id -q '.[] | select(.name == "新建测试工作流记录") | .id')
          gh run list --workflow $wid --limit 100 --json databaseId -q '.[2:][] | .databaseId' | xargs -n 1 gh run delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 清理旧 Releases（保留最新2个）
      - name: 删除旧Releases
        run: |
          gh release list --limit 100 | tail -n +3 | awk '{print $1}' | xargs -I {} gh release delete {} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
