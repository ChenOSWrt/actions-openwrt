name: 测试清理功能（不编译固件）

on:
  workflow_dispatch:

jobs:
  test-clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      - name: 清理旧Workflow记录（测试）
        run: |
          wid=$(gh workflow list --json name,id -q '.[] | select(.name == "新建测试工作流记录") | .id')
          gh run list --workflow $wid --limit 100 --json databaseId --jq ".[2:][] | .databaseId" | xargs -r gh run delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧Releases（测试）
        run: |
          gh release list --limit 100 | tail -n +3 | awk '{print $1}' | xargs -I {} gh release delete {} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
