name: 清理测试（工作流+Releases）
on: workflow_dispatch

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: 清理旧工作流记录
        run: |
          wid=$(gh workflow list --json name,id -q '.[] | select(.name == "新建测试Release") | .id')
          gh run list --workflow $wid --limit 100 --json databaseId -q '.[2:][] | .databaseId' | xargs -n 1 gh run delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧Releases
        run: |
          gh release list --json tagName --jq '.[2:][] | .tagName' | xargs -r -n 1 gh release delete --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
