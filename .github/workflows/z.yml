name: z

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  global:
    runs-on: ubuntu-22.04
    outputs:
      REPO_URL: ${{ steps.load_env.outputs.REPO_URL }}
      REPO_BRANCH: ${{ steps.load_env.outputs.REPO_BRANCH }}
      RELEASE_NOTES: ${{ steps.load_env.outputs.RELEASE_NOTES }}
      PART1_FEEDS: ${{ steps.load_env.outputs.PART1_FEEDS }}
      PART2_CUSTOM: ${{ steps.load_env.outputs.PART2_CUSTOM }}
      UPLOAD_BIN_DIR: ${{ steps.load_env.outputs.UPLOAD_BIN_DIR }}
      UPLOAD_FIRMWARE: ${{ steps.load_env.outputs.UPLOAD_FIRMWARE }}
      UPLOAD_RELEASE: ${{ steps.load_env.outputs.UPLOAD_RELEASE }}
      USE_CCACHE: ${{ steps.load_env.outputs.USE_CCACHE }}
      CCACHE_DIR: ${{ steps.load_env.outputs.CCACHE_DIR }}
      TZ: ${{ steps.load_env.outputs.TZ }}
      devices: ${{ steps.scan.outputs.devices }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: 加载 Part0_Global 全局变量
        id: load_env
        run: |
          while IFS='=' read -r key value; do
            [[ $key =~ ^#.*$ || -z $key ]] && continue
            value=$(echo "$value" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//" -e 's/ *#.*$//')
            echo "$key=$value" >> $GITHUB_OUTPUT
            echo "$key=$value" >> $GITHUB_ENV
          done < Part0_Global.env
          echo "✅ 全局变量加载完成："
          cat $GITHUB_OUTPUT

      - name: 扫描 CONFIGS 设备
        id: scan
        run: |
          [ -d configs ] || { echo "❌ 无configs目录" && exit 1; }
          list=$(ls configs/*.config 2>/dev/null | xargs -r basename -s .config)
          [ -z "$list" ] && { echo "❌ 没有找到.config文件，终止编译！" && exit 1; }
          echo devices=$(echo "$list" | jq -R . | jq -cs .) >> $GITHUB_OUTPUT
          echo "✅ 扫描到的设备：$list"

build:
  needs: global
  runs-on: ubuntu-22.04
  strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.global.outputs.devices) }}
        
  steps:
  - uses: actions/checkout@v6

  - name: 初始化编译环境、安装依赖

  - name: 编译完成后检查磁盘占用
    if: (!cancelled())
    run: df -hT

  - name: 上传编译的完整bin固件到 Actions 页面（需开启）
    uses: actions/upload-artifact@v6
    if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
    with:
      # 打包名称
      name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
      # 上传路径
      path: openwrt/bin

  - name: 整理bin固件成轻量固件
    id: organize
    if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
    run: |
      cd openwrt/bin/targets/*/*
      # 保留.img、.img.gz文件
      find . -type f ! -name '*.img' ! -name '*.img.gz' -delete
      rm -rf packages
      echo "✅ 最终保留的文件："
      ls -lh
      # 固件路径写入环境变量
      echo "FIRMWARE=$PWD" >> $GITHUB_ENV
      echo "status=success" >> $GITHUB_OUTPUT

  - name: 上传轻量固件到 Actions 页面
    uses: actions/upload-artifact@v6
    if: steps.organize.outputs.status == 'success' && !cancelled()
    with:
      # 固件包名称
      name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
      # 固件路径
      path: ${{ env.FIRMWARE }}

  - name: 生成版本发布标签
    id: tag
    if: env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true' && !cancelled()
    run: |
      # 版本号：v1.0.x
      echo "release_tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      echo "status=success" >> $GITHUB_OUTPUT

  - name: 发布轻量固件到 GitHub Releases 页面
    if: steps.tag.outputs.status == 'success' && !cancelled()
    run: |
      gh release create ${{ steps.tag.outputs.release_tag }} \
        --title "${{ steps.tag.outputs.release_tag }}" \
        --notes-file ${{ env.RELEASE_NOTES }} \
        ${{ env.FIRMWARE }}/*
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  - name: 清理旧的Workflow运行记录
    if: always()
    run: |
      # 保留最新5条运行记录
      gh run list --workflow "${{ github.workflow }}" --limit all \
        --json databaseId -q '.[5:][] | .databaseId' \
        | while read -r id; do
            if [ -n "$id" ]; then
              echo "⚠️ 正在删除运行记录：$id"
              gh run delete "$id" || echo "❌ 删除失败：$id"
            fi
          done
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  - name: 清理旧的Releases版本和Tags标签
    if: steps.tag.outputs.status == 'success' && !cancelled()
    run: |
      # 保留最新10个版本
      TAGS=$(gh release list --json tagName --jq '.[10:][] | .tagName')
      for tag in $TAGS; do
        echo "⚠️ 正在删除: $tag"
        gh release delete "$tag" --yes
        git push origin --delete "$tag"
      done
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
