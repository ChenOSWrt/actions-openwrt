# 当前GitHub Actions工作流名称
name: lede_Build

# 工作流触发条件
on:
  repository_dispatch:  # 支持仓库API远程触发
  workflow_dispatch:    # 支持手动在GitHub页面点击运行

# 全局环境变量配置
env:
  # OpenWrt源码仓库地址
  REPO_URL: https://github.com/coolsnowwolf/lede
  # 源码分支
  REPO_BRANCH: 20251001
  # 更新日志
  RELEASE_NOTES: release.txt
  # 自定义前置脚本1
  DIY_P1_SH: diy-part1.sh
  # 自定义后置脚本2
  DIY_P2_SH: diy-part2.sh
  # 是否上传完整编译bin目录
  UPLOAD_BIN_DIR: false
  # 是否上传编译好的固件
  UPLOAD_FIRMWARE: true
  # 是否发布到Releases版本
  UPLOAD_RELEASE: true
  # 是否启用编译缓存（ccache）
  USE_CCACHE: true
  # 编译缓存文件存放目录
  CCACHE_DIR: /workdir/ccache
  # 设置时区为上海
  TZ: Asia/Shanghai

# 工作流写入权限
permissions:
  contents: write
  packages: write

# 编译任务
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # 这里写设备名，自动匹配 configs/设备名.config
        device: [x86_64, nanopc_t6]

    steps:
    - name: 检出仓库代码到运行环境
      uses: actions/checkout@v6

    - name: 初始化编译环境、安装依赖、清理冗余
      env:
        # 非交互模式安装软件
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理系统多余缓存与目录，释放空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        # 清理本地docker镜像
        sudo docker image prune --all --force
        # 更新软件源
        sudo -E apt-get -qq update
        # 批量安装OpenWrt编译所需全部依赖包
        sudo -E apt-get -qq install \
        ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
        g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
        libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
        libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
        ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
        python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
        upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # 卸载无用依赖
        sudo -E apt-get -qq autoremove --purge
        # 清理apt缓存
        sudo -E apt-get -qq clean
        # 设置系统时区
        sudo timedatectl set-timezone "$TZ"
        # 创建工作目录
        sudo mkdir -p /workdir
        # 赋予工作目录权限
        sudo chown $USER:$GROUPS /workdir

    - name: 缓存加速编译（第一次编译成功后生效）
      if: env.USE_CCACHE == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-ccache-${{ matrix.device }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ matrix.device }}-

    - name: 克隆OpenWrt源码到工作目录
      # 指定执行目录
      working-directory: /workdir
      run: |
        # 查看当前磁盘空间
        df -hT $PWD
        # 拉取指定仓库和分支的源码
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 创建软链接，方便后续调用
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
 
    - name: 执行 DIY_P1_SH 脚本配置自定义插件源
      run: |
        # 给自定义脚本添加执行权限
        chmod +x $DIY_P1_SH
        # 进入openwrt目录
        cd openwrt
        # 执行第一阶段DIY脚本
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新插件源索引
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装所有插件源软件包
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置、文件并执行 DIY_P2_SH 脚本
      run: |
        # 复制自定义files文件到源码目录
        [ -e files ] && mv files openwrt/files
        # 复制自定义固件配置.config到源码目录
        cp configs/${{ matrix.device }}.config openwrt/.config
        # 添加第二阶段脚本执行权限
        chmod +x $DIY_P2_SH
        # 进入openwrt目录
        cd openwrt
        # 执行第二阶段DIY脚本
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载编译所需源码包，清理无效小文件
      id: package
      run: |
        cd openwrt
        # 生成默认配置
        make defconfig
        # 多线程下载源码包
        make download -j8
        # 列出小于1024字节的无效文件
        find dl -size -1024c -exec ls -l {} \;
        # 删除无效小文件
        find dl -size -1024c -exec rm -f {} \;

    - name: 正式编译OpenWrt固件
      id: compile
      run: |
        cd openwrt
        # 输出编译线程数
        echo -e "$(nproc) thread compile"
        # 多线程编译，失败降级单线程重试，最后带日志排查
        make -j$(nproc) || make -j1 || make -j1 V=s
        # 标记编译成功状态
        echo "status=success" >> $GITHUB_OUTPUT
        # 提取当前编译的设备型号
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        # 设备名写入环境变量
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        # 生成时间戳写入环境变量
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 编译完成后检查磁盘占用（未取消任务时执行）
      if: (!cancelled())
      run: df -hT

    - name: 上传完整bin编译目录为制品
      uses: actions/upload-artifact@v6
      # 编译成功且开启上传bin目录才执行
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        # 打包名称
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 上传路径
        path: openwrt/bin

    - name: 整理固件目录，删除无用packages
      id: organize
      # 开启固件上传且未取消任务才执行
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 进入固件输出目录
        cd openwrt/bin/targets/*/*
        # 删除多余软件包文件夹
        rm -rf packages
        # 固件路径写入环境变量
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        # 标记整理完成
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传纯净固件为GitHub Actions制品
      uses: actions/upload-artifact@v6
      # 目录整理成功且未取消任务才执行
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        # 固件包名称
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 固件路径
        path: ${{ env.FIRMWARE }}

    - name: 生成Releases版本标签和说明文件
      id: tag
      # 开启版本发布且未取消任务才执行
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 以日期时间作为版本标签
        # echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        YM=$(date +%Y%m)
        NUM=$(($(git tag|grep ^$YM-V|sort -V|tail -1|sed 's/[^0-9]9//g')+1))
        echo "release_tag=$YM-V${NUM:-1}" >> $GITHUB_OUTPUT
        # 标记标签生成成功
        echo "status=success" >> $GITHUB_OUTPUT
 
    - name: 将固件发布到GitHub Releases
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        gh release create ${{ steps.tag.outputs.release_tag }} \
          --title "${{ steps.tag.outputs.release_tag }}" \
          --notes-file ${{ env.RELEASE_NOTES }} \
          ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: 自动清理旧的Workflow运行记录
      if: always()
      run: |
        # 获取需要删除的100条工作流记录（保留最新2个）
        gh run list --workflow "${{ github.workflow }}" --limit 100 \
          --json databaseId -q '.[2:][] | .databaseId' \
          | xargs -n 1 gh run delete
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 自动删除老旧Releases和Tags版本
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 获取需要删除的标签列表（保留最新2个）
        TAGS=$(gh release list --json tagName --jq '.[2:][] | .tagName')
        for tag in $TAGS; do
          echo "正在删除: $tag"
          # 删除 Release
          gh release delete "$tag" --yes
          # 删除 Tags
          git push origin --delete "$tag"
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
