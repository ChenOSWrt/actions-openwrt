# 工作流Workflows名称
name: Buildkk1

on:
  # 支持API远程触发
  repository_dispatch:
  # 支持Actions页面手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write
  packages: write

jobs:
  scan:
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.scan.outputs.devices }}
    steps:
      - name: 拉取代码到虚拟运行环境
        uses: actions/checkout@v6
      
      - name: 扫描CONFIGS设备
        id: scan
        run: |
          [ -d configs ] || { echo "❌ 无configs目录" && exit 1; }
          list=$(ls configs/*.config 2>/dev/null | xargs -r basename -s .config)
          [ -z "$list" ] && { echo "❌ 没有找到.config文件，终止编译！" && exit 1; }
          echo devices=$(echo "$list" | jq -R . | jq -cs .) >> $GITHUB_OUTPUT
          echo "✅ 扫描到的设备：$list"

  build:
    needs: scan
    runs-on: ubuntu-22.04
    strategy:
        fail-fast: false
        matrix:
          device: ${{ fromJson(needs.scan.outputs.devices) }}
    steps:
    - name: 拉取代码到虚拟运行环境
      uses: actions/checkout@v6

    # 第一步：加载全局变量
    - name: 加载全局变量
      run: |
        grep -v '^#' Part0_Global.env | grep -v '^$' >> $GITHUB_ENV

    # 第二步：设置绝对路径
    - name: 设置绝对路径
      run: |
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "DL_DIR=${{ github.workspace }}/dl" >> $GITHUB_ENV
        
        # 创建缓存目录
        mkdir -p ${{ github.workspace }}/.ccache
        mkdir -p ${{ github.workspace }}/dl
        
        # 验证目录
        echo "CCACHE_DIR: ${{ github.workspace }}/.ccache"
        echo "DL_DIR: ${{ github.workspace }}/dl"
        ls -ld ${{ github.workspace }}/.ccache
        ls -ld ${{ github.workspace }}/dl

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理系统冗余文件释放空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        # 清理本地docker镜像
        sudo docker image prune --all --force
        # 更新软件源
        sudo -E apt-get -qq update
        # 安装编译依赖（已包含ccache）
        sudo -E apt-get -qq install \
        ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
        g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
        libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
        libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
        ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
        python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
        upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # 卸载无用依赖
        sudo -E apt-get -qq autoremove --purge
        # 清理apt缓存
        sudo -E apt-get -qq clean
        # 设置系统时区
        sudo timedatectl set-timezone "$TZ"
        # 创建工作目录
        sudo mkdir -p /workdir
        # 赋予工作目录权限
        sudo chown $USER:$GROUPS /workdir

    # ==============================================
    # 缓存部分：严格控制在 9GB 以内
    # ==============================================
    
    - name: 恢复Ccache编译缓存（最大 8GB）
      if: env.USE_CCACHE == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-ccache-${{ matrix.device }}-${{ hashFiles('configs/${{ matrix.device }}.config') }}-${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ matrix.device }}-${{ hashFiles('configs/${{ matrix.device }}.config') }}-
          ${{ runner.os }}-ccache-${{ matrix.device }}-

    - name: 恢复源码下载目录缓存（最大 1GB）
      uses: actions/cache@v5
      with:
        path: ${{ env.DL_DIR }}
        key: ${{ runner.os }}-dl-${{ matrix.device }}-${{ hashFiles('configs/${{ matrix.device }}.config') }}
        restore-keys: |
          ${{ runner.os }}-dl-${{ matrix.device }}-

    - name: 配置Ccache环境变量
      if: env.USE_CCACHE == 'true'
      run: |
        # 配置ccache环境变量
        echo "CCACHE_DIR=${{ env.CCACHE_DIR }}" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=${{ env.CCACHE_MAXSIZE }}" >> $GITHUB_ENV
        echo "CCACHE_COMPRESS=${{ env.CCACHE_COMPRESS }}" >> $GITHUB_ENV
        echo "CCACHE_COMPRESSLEVEL=${{ env.CCACHE_COMPRESSLEVEL }}" >> $GITHUB_ENV
        echo "CCACHE_DIRECT=${{ env.CCACHE_DIRECT }}" >> $GITHUB_ENV
        echo "CCACHE_DEPEND=${{ env.CCACHE_DEPEND }}" >> $GITHUB_ENV
        echo "CCACHE_NOHASHDIR=${{ env.CCACHE_NOHASHDIR }}" >> $GITHUB_ENV
        echo "CCACHE_FILECLONE=${{ env.CCACHE_FILECLONE }}" >> $GITHUB_ENV
        
        # 重置ccache统计
        ccache -z
        
        # 验证ccache配置
        echo "==================== Ccache 配置验证 ===================="
        ccache --version
        echo "--------------------------------------------------------"
        ccache -p
        echo "========================================================"

    # ==============================================
    # 编译流程：分阶段编译
    # ==============================================

    - name: 克隆OpenWrt源码
      working-directory: /workdir
      run: |
        # 查看当前磁盘空间
        df -hT $PWD
        # 拉取指定仓库和分支的源码
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 创建软链接，方便后续调用
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 执行PART1_FEEDS插件源配置文件
      run: |
        chmod +x $PART1_FEEDS
        cd openwrt
        $GITHUB_WORKSPACE/$PART1_FEEDS
    
    - name: 更新并安装插件源软件包
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: 执行PART2_CUSTOM自定义配置文件
      run: |
        [ -e files ] && mv files openwrt/files
        # 加载Configs对应设备的编译配置
        cp configs/${{ matrix.device }}.config openwrt/.config
        chmod +x $PART2_CUSTOM
        cd openwrt
        
        # 强制禁用OpenWrt内置ccache
        sed -i '/CONFIG_CCACHE/d' .config
        echo "CONFIG_CCACHE=n" >> .config
        
        # 优化编译参数（不影响兼容性）
        sed -i '/CONFIG_EXTRA_OPTIMIZATION/d' .config
        echo "CONFIG_EXTRA_OPTIMIZATION="-O2 -pipe"" >> .config
        
        $GITHUB_WORKSPACE/$PART2_CUSTOM
        
    - name: 下载编译所需源码包
      run: |
        cd openwrt
        make defconfig
        
        # 通过DL_DIR环境变量告诉OpenWrt使用我们的缓存目录
        make download -j8 DL_DIR=${{ env.DL_DIR }}
        
        # 清理无效文件和旧文件
        echo "下载目录大小："
        du -sh ${{ env.DL_DIR }}
        find ${{ env.DL_DIR }} -size -1024c -exec rm -f {} \;
        find ${{ env.DL_DIR }} -type f -mtime +30 -delete
  
    # ✅ 第一阶段：只编译工具链（使用原生gcc，绝对不会出错）
    - name: 编译工具链（第一阶段）
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile toolchain"
        make toolchain/install -j$(nproc) DL_DIR=${{ env.DL_DIR }} \
          || make toolchain/install -j1 DL_DIR=${{ env.DL_DIR }} \
          || make toolchain/install -j1 V=s DL_DIR=${{ env.DL_DIR }}
        
        echo "✅ 工具链编译完成！"
    
    # ✅ 第二阶段：编译所有软件包和固件（使用ccache加速）
    - name:  编译固件（第二阶段，ccache加速）
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile firmware"
        
        # 只有这一步使用ccache，只加速软件包编译
        make -j$(nproc) \
          TARGET_CC="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-gcc" \
          TARGET_CXX="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-g++" \
          DL_DIR=${{ env.DL_DIR }} \
          || make -j1 \
            TARGET_CC="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-gcc" \
            TARGET_CXX="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-g++" \
            DL_DIR=${{ env.DL_DIR }} \
          || make -j1 V=s \
            TARGET_CC="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-gcc" \
            TARGET_CXX="ccache $(pwd)/staging_dir/toolchain-aarch64_generic_gcc-13.3.0_musl/bin/aarch64-openwrt-linux-g++" \
            DL_DIR=${{ env.DL_DIR }}
        
        echo "status=success" >> $GITHUB_OUTPUT
        # 提取当前编译的设备型号
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        # 设备名写入环境变量
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        # 生成时间戳写入环境变量
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
    
    - name: 查看Ccache缓存状态
      if: env.USE_CCACHE == 'true'
      run: |
        echo "==================== Ccache 编译统计 ===================="
        ccache -s
        echo "========================================================"
        echo "Ccache缓存目录大小："
        du -sh ${{ env.CCACHE_DIR }}
        echo "源码下载目录大小："
        du -sh ${{ env.DL_DIR }}
        # 清理ccache中超过7天未使用的缓存
        ccache --evict-older-than 7d
    
    - name: 查看磁盘占用
      if: steps.compile.outputs.status == 'success' && !cancelled() 
      run: df -hT
  
    - name: 上传完整bin固件到Actions页面（需开启）
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        # 打包名称
        name: ${{ env.SOURCE_NAME }}_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 上传路径
        path: openwrt/bin
  
    - name: 整理bin固件成轻量固件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        # 保留.img、.img.gz文件
        find . -type f ! -name '*.img' ! -name '*.img.gz' -delete
        rm -rf packages
        echo "✅ 最终保留的文件："
        ls -lh
        # 固件路径写入环境变量
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: 上传轻量固件到Actions页面
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        # 固件包名称
        name: ${{ env.SOURCE_NAME }}_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 固件路径
        path: ${{ env.FIRMWARE }}
  
    - name: 生成版本号和标签
      id: tag
      if: env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true'
      run: |
        # 版本号：v1.0.x
        echo "release_tag=v1.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: 发布轻量固件到Releases页面
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        gh release view "${{ steps.tag.outputs.release_tag }}" >/dev/null 2>&1 || \
        gh release create "${{ steps.tag.outputs.release_tag }}" \
          --title "${{ steps.tag.outputs.release_tag }}" \
          --notes-file "${{ env.RELEASE_NOTES }}"
        gh release upload "${{ steps.tag.outputs.release_tag }}" \
          ${{ env.FIRMWARE }}/* \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: 清理旧的Workflows运行记录
      if: always()
      run: |
        # 保留最新5条运行记录
        gh run list --workflow "${{ github.workflow }}" --limit all \
          --json databaseId -q '.[5:][] | .databaseId' \
          | while read -r id; do
              if [ -n "$id" ]; then
                echo "⚠️ 正在删除运行记录：$id"
                gh run delete "$id" || echo "❌ 删除失败：$id"
              fi
            done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
    - name: 清理旧的Releases和Tags
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        # 保留最新10个版本
        TAGS=$(gh release list --json tagName --jq '.[10:][] | .tagName')
        for tag in $TAGS; do
          echo "⚠️ 正在删除: $tag"
          gh release delete "$tag" --yes
          git push origin --delete "$tag"
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ==============================================
    # 自动清理旧缓存
    # ==============================================
    - name: 自动清理旧缓存
      if: always()
      run: |
        echo "==================== 清理旧缓存 ===================="
        DEVICE="${{ matrix.device }}"
        
        # 只保留当前设备最新的2个ccache缓存
        echo "清理设备 $DEVICE 的旧ccache缓存..."
        gh cache list --key "ccache-$DEVICE-*" --sort created_at --order desc \
          --json id,key,createdAt --jq '.[2:][] | .id' \
          | while read -r id; do
              if [ -n "$id" ]; then
                echo "删除缓存: $id"
                gh cache delete "$id" || echo "删除失败: $id"
              fi
            done
        
        # 只保留当前设备最新的1个dl缓存
        echo "清理设备 $DEVICE 的旧dl缓存..."
        gh cache list --key "dl-$DEVICE-*" --sort created_at --order desc \
          --json id,key,createdAt --jq '.[1:][] | .id' \
          | while read -r id; do
              if [ -n "$id" ]; then
                echo "删除缓存: $id"
                gh cache delete "$id" || echo "删除失败: $id"
              fi
            done
        
        echo "缓存清理完成！"
        echo "当前缓存列表："
        gh cache list --sort size_in_bytes --order desc
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
