# 工作流Workflows名称
name: kk1

on:
  # 支持API远程触发
  repository_dispatch:
  # 支持Actions页面手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write
  packages: write

jobs:
  scan:
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.scan.outputs.devices }}
    steps:
      - name: 拉取代码到虚拟运行环境
        uses: actions/checkout@v6
      
      - name: 扫描CONFIGS设备
        id: scan
        run: |
          [ -d configs ] || { echo "❌ 无configs目录" && exit 1; }
          list=$(ls configs/*.config 2>/dev/null | xargs -r basename -s .config)
          [ -z "$list" ] && { echo "❌ 没有找到.config文件，终止编译！" && exit 1; }
          echo devices=$(echo "$list" | jq -R . | jq -cs .) >> $GITHUB_OUTPUT
          echo "✅ 扫描到的设备：$list"

  build:
    needs: scan
    runs-on: ubuntu-22.04
    strategy:
        fail-fast: false
        matrix:
          device: ${{ fromJson(needs.scan.outputs.devices) }}
    steps:
    - name: 拉取代码到虚拟运行环境
      uses: actions/checkout@v6

    - name: 加载PART0_GLOBAL全局变量
      run: grep -v '^#' Part0_Global.env | grep -v '^$' >> $GITHUB_ENV

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理系统冗余文件释放空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        # 清理本地docker镜像
        sudo docker image prune --all --force
        # 更新软件源
        sudo -E apt-get -qq update
        # 安装编译依赖
        sudo -E apt-get -qq install \
        ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
        g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
        libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
        libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
        ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
        python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
        upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # 卸载无用依赖
        sudo -E apt-get -qq autoremove --purge
        # 清理apt缓存
        sudo -E apt-get -qq clean
        # 设置系统时区
        sudo timedatectl set-timezone "$TZ"
        # 创建工作目录
        sudo mkdir -p /workdir "${{ env.CACHE_SYNC }}"
        # 赋予工作目录权限
        sudo chown $USER:$GROUPS /workdir "${{ env.CACHE_SYNC }}"

    - name: 恢复编译数据
      if: env.USE_CCACHE == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ env.CACHE_SYNC }}
        key: ${{ runner.os }}-sync-${{ matrix.device }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-sync-${{ matrix.device }}-
  
    - name: 克隆OpenWrt源码
      working-directory: /workdir
      run: |
        # 查看当前磁盘空间
        df -hT $PWD
        # 拉取指定仓库和分支的源码
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        # 创建软链接，方便后续调用
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 同步编译数据
      if: env.USE_CCACHE == 'true'
      run: |
        [ -d "${{ env.CACHE_SYNC }}/dl" ] &&
        rsync -a --delete "${{ env.CACHE_SYNC }}/dl/" /workdir/openwrt/dl/ &&
        echo "✅ dl 同步完成" || true

        [ -d "${{ env.CACHE_SYNC }}/ccache" ] &&
        rsync -a --delete "${{ env.CACHE_SYNC }}/ccache/" /workdir/openwrt/.ccache/ &&
        echo "✅ ccache 同步完成" || true

        [ -d "${{ env.CACHE_SYNC }}/tools-stamps" ] &&
        rsync -a --delete "${{ env.CACHE_SYNC }}/tools-stamps/" /workdir/openwrt/tools/ &&
        echo "✅ tools 时间戳同步完成" || true

        [ -d "${{ env.CACHE_SYNC }}/host" ] &&
        mkdir -p /workdir/openwrt/staging_dir/host &&
        rsync -a --delete "${{ env.CACHE_SYNC }}/host/" /workdir/openwrt/staging_dir/host/ &&
        echo "✅ host工具链同步完成" || true

    - name: 执行PART1_FEEDS配置文件
      run: |
        chmod +x $PART1_FEEDS
        cd openwrt
        $GITHUB_WORKSPACE/$PART1_FEEDS
    
    - name: 更新并安装插件源软件包
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: 执行PART2_CUSTOM配置文件
      run: |
        [ -e files ] && mv files openwrt/files
        # 加载Configs对应设备的编译配置
        cp configs/${{ matrix.device }}.config openwrt/.config
        chmod +x $PART2_CUSTOM
        cd openwrt
        make defconfig
        $GITHUB_WORKSPACE/$PART2_CUSTOM
        sed -i '/CONFIG_CCACHE/d' .config
        echo "CONFIG_CCACHE=y" >> .config
        echo "CONFIG_CCACHE_DIR=\"/workdir/openwrt/.ccache\"" >> .config
        echo "⚠️ 验证开关是否打开..."
        grep CCACHE .config
        
    - name: 下载编译所需源码包
      run: |
        cd openwrt
        make download -j8
        # 列出和删除小于1024字节的无效文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
  
    - name:  编译OpenWrt固件
      id: compile
      run: |
        cd openwrt
        CCACHE_DIR=/workdir/openwrt/.ccache ccache -z
        export SOURCE_DATE_EPOCH=1704067200

        SKIP_TOOLS=false
        if [ "$USE_CCACHE" = "true" ]; then
          if find tools -maxdepth 1 -name ".stamp_built" -type f 2>/dev/null | grep -q .; then
            echo "✅ 已还原host工具链，直接跳过tools编译"
            SKIP_TOOLS=true
          else
            echo "⚠️ 首次编译，完整编译tools"
            SKIP_TOOLS=false
          fi
        else
          echo "❌ 缓存关闭，正常编译tools"
          SKIP_TOOLS=false
        fi

        [ "$SKIP_TOOLS" = "true" ] && echo "tools/compile: ;" > tools/Makefile
        FORCE_UNSAFE_CONFIGURE=1 make -j$(nproc) || make -j1 V=s
        git checkout -- tools/Makefile
        
        # 成功编译标记
        echo "status=success" >> $GITHUB_OUTPUT
        # 提取当前编译的设备型号
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        # 设备名写入环境变量
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        # 生成时间戳写入环境变量
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 备份编译数据
      if: env.USE_CCACHE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        rsync -a --delete /workdir/openwrt/dl/ "${{ env.CACHE_SYNC }}/dl/" &&
        echo "✅ dl 备份完成" || true

        rsync -a --delete /workdir/openwrt/.ccache/ "${{ env.CACHE_SYNC }}/ccache/" &&
        echo "✅ ccache 备份完成" || true

        find /workdir/openwrt/tools -name ".stamp*" -type f -print0 |
        rsync -a --delete --files-from=- --from0 / "${{ env.CACHE_SYNC }}/tools-stamps/" &&
        echo "✅ tools编译标记备份完成" || true

        rsync -a --delete /workdir/openwrt/staging_dir/host/ "${{ env.CACHE_SYNC }}/host/" &&
        echo "✅ host工具链备份完成" || true

        
    - name: 查看编译数据
      if: env.USE_CCACHE == 'true'
      run: |
        echo "========================================"
        echo "🔍 ccache 缓存终极验证"
        echo "========================================"
        
        # 1. 验证ccache实际使用的目录（最权威）
        echo "📌 1. ccache 实际运行目录："
        ACTUAL_DIR=$(CCACHE_DIR=/workdir/openwrt/.ccache ccache --get-config cache_dir)
        echo "   配置目录：/workdir/openwrt/.ccache"
        echo "   实际目录：$ACTUAL_DIR"
        if [ "$ACTUAL_DIR" = "/workdir/openwrt/.ccache" ]; then
          echo "   ✅ 目录配置正确"
        else
          echo "   ❌ 目录配置错误！"
        fi
        echo ""
        
        # 2. 检查系统默认目录有没有缓存（防止泄露）
        echo "📌 2. 系统默认缓存目录检查："
        DEFAULT_DIR="$HOME/.ccache"
        if [ -d "$DEFAULT_DIR" ]; then
          echo "   默认目录存在：$DEFAULT_DIR"
          echo "   默认目录大小：$(du -sh $DEFAULT_DIR | awk '{print $1}')"
          if [ $(du -s $DEFAULT_DIR | awk '{print $1}') -gt 1024 ]; then
            echo "   ⚠️ 警告：系统默认目录有缓存数据！"
          else
            echo "   ✅ 系统默认目录为空"
          fi
        else
          echo "   ✅ 系统默认目录不存在"
        fi
        echo ""
        
        # 3. 显示工作目录缓存文件结构
        echo "📌 3. 工作目录缓存文件结构："
        WORK_CACHE="/workdir/openwrt/.ccache"
        if [ -d "$WORK_CACHE" ]; then
          echo "   总大小：$(du -sh $WORK_CACHE | awk '{print $1}')"
          echo "   一级目录结构："
          ls -lh $WORK_CACHE | grep -v "^total" | awk '{print "   - " $9 " (" $5 ")"}'
          echo ""
          echo "   缓存对象数量：$(find $WORK_CACHE -type f | wc -l)"
        else
          echo "   ❌ 工作目录缓存不存在"
        fi
        echo ""
        
        # 4. 显示备份目录缓存文件结构
        echo "📌 4. 备份目录缓存文件结构："
        BACKUP_CACHE="${{ env.CACHE_SYNC }}/ccache"
        if [ -d "$BACKUP_CACHE" ]; then
          echo "   总大小：$(du -sh $BACKUP_CACHE | awk '{print $1}')"
          echo "   一级目录结构："
          ls -lh $BACKUP_CACHE | grep -v "^total" | awk '{print "   - " $9 " (" $5 ")"}'
          echo ""
          echo "   缓存对象数量：$(find $BACKUP_CACHE -type f | wc -l)"
        else
          echo "   ❌ 备份目录缓存不存在"
        fi
        echo ""
        
        # 5. 显示完整缓存命中统计
        echo "📌 5. 完整缓存命中统计："
        CCACHE_DIR=/workdir/openwrt/.ccache ccache -s
        echo "========================================"
        
        # 6. 显示所有编译数据目录大小
        echo "📌 6. 所有编译数据目录大小："
        du -sh "${{ env.CACHE_SYNC }}"/*
        echo "========================================"
        
        
        
        
        #echo "缓存软件版本"
        #ccache --version
        #echo "缓存命中统计"
        #CCACHE_DIR=/workdir/openwrt/.ccache ccache -s
        #echo "编译数据目录大小"
        #du -sh "${{ env.CACHE_SYNC }}"/*
    
    - name: 查看磁盘占用
      if: steps.compile.outputs.status == 'success' && !cancelled() 
      run: df -hT
  
    - name: 上传Bin目录到Actions页面
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled() 
      with:
        # 打包名称
        name: ${{ env.SOURCE_NAME }}_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        #name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 上传路径
        path: openwrt/bin
  
    - name: 精简Bin目录，保留核心固件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        # 保留.img、.img.gz文件
        find . -type f ! -name '*.img' ! -name '*.img.gz' -delete
        rm -rf packages
        echo "✅ 最终保留的文件："
        ls -lh
        # 固件路径写入环境变量
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: 上传核心固件到Actions页面
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        # 固件包名称
        name: ${{ env.SOURCE_NAME }}_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        #name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        # 固件路径
        path: ${{ env.FIRMWARE }}
  
    - name: 生成版本号和标签
      id: tag
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 版本号：v1.0.x
        echo "release_tag=v1.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: 发布核心固件到Releases页面
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        gh release view "${{ steps.tag.outputs.release_tag }}" >/dev/null 2>&1 || \
        gh release create "${{ steps.tag.outputs.release_tag }}" \
          --title "${{ steps.tag.outputs.release_tag }}" \
          --notes-file "${{ env.RELEASE_NOTES }}"
        gh release upload "${{ steps.tag.outputs.release_tag }}" \
          ${{ env.FIRMWARE }}/* \
          --clobber
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: 清理旧的Workflows运行记录
      if: always()
      run: |
        CLEAN_TYPE=run
        KEEP_LATEST=10
        KEEP_DAYS=14
        bash .github/scripts/clean.sh
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        
    - name: 清理旧 Releases 和 Tags
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        CLEAN_TYPE=release
        KEEP_LATEST=3
        KEEP_DAYS=30
        bash .github/scripts/clean.sh
      env:
        GITHUB_TOKEN: ${{ github.token }}
