# 工作流Workflows名称
name: c_build

on:
  # 支持API远程触发
  repository_dispatch:
  # 支持Actions页面手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write
  packages: write

jobs:
  scan:
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.scan.outputs.devices }}
    steps:
      - name: 拉取代码到虚拟运行环境
        uses: actions/checkout@v6
      
      - name: 扫描CONFIGS设备
        id: scan
        run: |
          [ -d configs ] || { echo "❌ 无configs目录" && exit 1; }
          list=$(ls configs/*.config 2>/dev/null | xargs -r basename -s .config)
          [ -z "$list" ] && { echo "❌ 没有找到.config文件，终止编译！" && exit 1; }
          echo devices=$(echo "$list" | jq -R . | jq -cs .) >> $GITHUB_OUTPUT
          echo "✅ 扫描到的设备：$list"

  build:
    needs: scan
    runs-on: ubuntu-22.04
    strategy:
        fail-fast: false
        matrix:
          device: ${{ fromJson(needs.scan.outputs.devices) }}
    steps:
    - name: 拉取代码到虚拟运行环境
      uses: actions/checkout@v6

    - name: 加载全局变量
      run: grep -v '^#' Part0_Global.env | grep -v '^$' >> $GITHUB_ENV

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理系统冗余文件释放空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        # 清理本地docker镜像
        sudo docker image prune --all --force
        # 更新软件源
        sudo -E apt-get -qq update
        # 安装编译依赖
        sudo -E apt-get -qq install \
        ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
        g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
        libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
        libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
        ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
        python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
        upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # 卸载无用依赖
        sudo -E apt-get -qq autoremove --purge
        # 清理apt缓存
        sudo -E apt-get -qq clean
        # 设置系统时区
        sudo timedatectl set-timezone "$TZ"
        # 创建工作目录和HC备份缓存目录
        sudo mkdir -p /workdir /workdir/HC
        # 赋予正确的权限
        sudo chown $USER:$GROUPS /workdir /workdir/HC
        chmod -R u+rwX /workdir/HC

    - name: 恢复备份缓存
      if: env.USE_CCACHE == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ env.HC_DIR }}
        key: ${{ runner.os }}-hc-v1-${{ matrix.device }}-${{ hashFiles('configs/${{ matrix.device }}.config') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-hc-v1-${{ matrix.device }}-${{ hashFiles('configs/${{ matrix.device }}.config') }}-
          ${{ runner.os }}-hc-v1-${{ matrix.device }}-

    - name: 克隆OpenWrt源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 编译前同步缓存
      if: env.USE_CCACHE == 'true'
      run: |
        cd openwrt
        
        if [ -d "${{ env.HC_DIR }}" ] && [ -n "$(ls -A "${{ env.HC_DIR }}")" ]; then
          echo "✅ 发现备份缓存，开始同步到默认路径..."
          
          if [ -d "${{ env.HC_DIR }}/ccache" ]; then
            mkdir -p ~/.ccache
            rsync -a --delete "${{ env.HC_DIR }}/ccache/" ~/.ccache/
            echo "✅ ccache缓存同步完成"
          fi
          
          if [ -d "${{ env.HC_DIR }}/dl" ]; then
            mkdir -p dl
            rsync -a --delete "${{ env.HC_DIR }}/dl/" dl/
            echo "✅ dl源码包缓存同步完成"
          fi
          
          if [ -d "${{ env.HC_DIR }}/staging_dir" ]; then
            mkdir -p staging_dir
            rsync -a --delete "${{ env.HC_DIR }}/staging_dir/" staging_dir/
            echo "✅ staging_dir工具链缓存同步完成"
          fi
          
          echo "✅ 所有缓存同步完成"
        else
          echo "ℹ️ 没有找到备份缓存，将进行全新编译"
        fi

    - name: 执行PART1_FEEDS插件源配置文件
      run: |
        chmod +x $PART1_FEEDS
        cd openwrt
        $GITHUB_WORKSPACE/$PART1_FEEDS
    
    - name: 更新并安装插件源软件包
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: 执行PART2_CUSTOM自定义配置文件
      run: |
        [ -e files ] && mv files openwrt/files
        cp configs/${{ matrix.device }}.config openwrt/.config
        chmod +x $PART2_CUSTOM
        cd openwrt
        $GITHUB_WORKSPACE/$PART2_CUSTOM
        
        make defconfig
        
        sed -i '/CONFIG_CCACHE/d' .config
        echo "CONFIG_CCACHE=y" >> .config
        echo "验证配置..."
        grep CCACHE .config
        
    - name: 下载编译所需源码包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
  
    - name:  编译OpenWrt固件
      id: compile
      run: |
        cd openwrt
        export SOURCE_DATE_EPOCH=1704067200
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 编译后同步缓存
      if: env.USE_CCACHE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt
        
        echo "✅ 编译成功，开始更新备份缓存..."
        
        # 先清空旧的备份缓存
        rm -rf "${{ env.HC_DIR }}"/*
        
        if [ -d ~/.ccache ]; then
          mkdir -p "${{ env.HC_DIR }}/ccache"
          rsync -a --delete ~/.ccache/ "${{ env.HC_DIR }}/ccache/"
          echo "✅ ccache缓存备份完成"
        fi
        
        if [ -d dl ]; then
          mkdir -p "${{ env.HC_DIR }}/dl"
          rsync -a --delete dl/ "${{ env.HC_DIR }}/dl/"
          echo "✅ dl源码包缓存备份完成"
        fi
        
        if [ -d staging_dir ]; then
          mkdir -p "${{ env.HC_DIR }}/staging_dir"
          rsync -a --delete staging_dir/ "${{ env.HC_DIR }}/staging_dir/"
          echo "✅ staging_dir工具链缓存备份完成"
        fi
        
        echo "✅ 所有缓存备份完成"
        echo "缓存目录大小："
        du -sh "${{ env.HC_DIR }}"/*
    
    - name: 查看缓存状态
      if: env.USE_CCACHE == 'true'
      run: |
        echo "缓存版本"
        ccache --version
        echo "缓存统计"
        ccache -s
    
    - name: 查看磁盘占用
      if: steps.compile.outputs.status == 'success' && !cancelled() 
      run: df -hT
  
    - name: 上传bin目录完整压缩包到Actions页面（需开启）
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled() 
      with:
        name: ${{ env.SOURCE_NAME }}_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin
  
    - name: 精简bin目录，保留核心固件
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        find . -type f ! -name '*.img' ! -name '*.img.gz' -delete
        rm -rf packages
        echo "✅ 最终保留的文件："
        ls -lh
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: 上传核心固件到Actions页面
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.SOURCE_NAME }}_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
  
    - name: 生成版本号和标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=v1.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布核心固件到Releases页面
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        if [ -z "${{ env.FIRMWARE }}" ] || [ ! -d "${{ env.FIRMWARE }}" ] || [ -z "$(ls -A "${{ env.FIRMWARE }}")" ]; then
          echo "❌ 固件目录为空，跳过发布"
          exit 1
        fi
        
        gh release view "${{ steps.tag.outputs.release_tag }}" >/dev/null 2>&1 || \
        gh release create "${{ steps.tag.outputs.release_tag }}" \
          --title "${{ steps.tag.outputs.release_tag }}" \
          --notes-file "${{ env.RELEASE_NOTES }}"
        
        gh release upload "${{ steps.tag.outputs.release_tag }}" \
          ${{ env.FIRMWARE }}/* \
          --clobber \
          --fail-on-no-uploads
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: 清理旧的Workflows运行记录
      if: always()
      run: |
        gh run list --workflow "${{ github.workflow }}" --limit all \
          --json databaseId -q '.[3:][] | .databaseId' \
          | while read -r id; do
              if [ -n "$id" ]; then
                echo "⚠️ 正在删除运行记录：$id"
                gh run delete "$id" || echo "❌ 删除失败：$id"
              fi
            done
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: 清理旧的Releases和Tags
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        TAGS=$(gh release list --json tagName --jq '.[10:][] | .tagName')
        for tag in $TAGS; do
          echo "⚠️ 正在删除: $tag"
          gh release delete "$tag" --yes
          git push origin --delete "$tag"
        done
      env:
        GITHUB_TOKEN: ${{ github.token }}
