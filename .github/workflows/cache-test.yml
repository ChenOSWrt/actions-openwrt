name: 极简缓存测试
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      # 1. 创建目录 + 写入测试文件（确保目录非空且存在）
      - name: 准备缓存目录
        run: |
          mkdir -p ~/.ccache
          echo "Hello Cache" > ~/.ccache/test.txt

      # 2. 缓存核心步骤（最简写法）
      - name: 保存/加载缓存
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: mytestcache-v1

      # 3. 验证
      - name: 查看缓存状态
        run: |
          echo "cache-hit: ${{ steps.保存/加载缓存.outputs.cache-hit }}"
          cat ~/.ccache/test.txt
