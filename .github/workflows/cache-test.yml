name: lede_Build 缓存测试
on:
  workflow_dispatch:

env:
  USE_CCACHE: true
  CCACHE_DIR: $HOME/.ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: [nanopc_t6]

    steps:
    - uses: actions/checkout@v6

    # ========== 最简洁的缓存代码 ==========
    - name: 创建缓存目录
      run: mkdir -p $HOME/.ccache && touch $HOME/.ccache/test

    - name: 缓存
      uses: actions/cache@v5
      id: cache
      with:
        path: $HOME/.ccache
        key: test-${{ matrix.device }}

    - name: 查看结果
      run: echo "缓存命中：${{ steps.cache.outputs.cache-hit }}"
    # =====================================
