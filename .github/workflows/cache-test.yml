name: Test CCACHE 50MB+ 大缓存
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      CCACHE_DIR: /home/runner/.ccache

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y gcc g++ ccache

      - name: 创建缓存目录
        run: |
          mkdir -p $CCACHE_DIR
          touch $CCACHE_DIR/.keep

      - name: GitHub 缓存保存
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-BIGCACHE-50MB-v1

      - name: 启用 ccache
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=0" >> $GITHUB_ENV  # 关闭压缩 = 缓存更大
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          ccache -z

      - name: 【重型编译】生成 1200 个大文件 → 缓存 50MB+
        run: |
          mkdir -p build
          cd build
          for i in {1..1200}; do
            echo "void func$i() { long a=$i; long b=a*2; long c=b+3; }" > test$i.c
            gcc -c test$i.c -o test$i.o
          done

      - name: 查看缓存大小（一定 50MB+）
        run: |
          echo "========================"
          ccache -s
          echo "========================"
          du -sh $CCACHE_DIR
