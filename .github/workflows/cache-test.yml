name: 缓存测试（必成功版）
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      # 1. 检出代码（必须）
      - uses: actions/checkout@v6

      # 2. 创建缓存目录 + 写入测试文件（确保目录存在且非空）
      - name: 准备缓存目录
        run: |
          mkdir -p ~/.ccache
          echo "Hello Cache" > ~/.ccache/test.txt

      # 3. 加载/保存缓存（核心步骤）
      - name: 缓存
        uses: actions/cache@v5
        id: cache
        with:
          path: ~/.ccache
          key: test-cache-1

      # 4. 验证（确保任务成功）
      - name: 查看结果
        run: |
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          cat ~/.ccache/test.txt
