name: Test CCACHE 终极稳定版
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      CCACHE_DIR: /home/runner/.ccache

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y gcc g++ ccache

      - name: 创建缓存目录
        run: |
          mkdir -p $CCACHE_DIR
          touch $CCACHE_DIR/.keep

      - name: GitHub 缓存配置
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-final-test-v1

      - name: 启用 ccache
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          ccache -z

      - name: 【关键】只编译不链接，强制可缓存
        run: |
          mkdir -p build
          cd build
          # 这次只生成目标文件（.o），不带链接，确保 ccache 能缓存
          for i in {1..300}; do
            echo "int main$i() { return 0; }" > test$i.c
            gcc -O2 -c test$i.c -o test$i.o
          done

      - name: 查看最终缓存（这次一定成功！）
        run: |
          echo "===== CCACHE 状态 ====="
          ccache -s
          echo "===== 缓存目录大小 ====="
          du -sh $CCACHE_DIR
