name: Test CCACHE 真50MB+缓存
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      CCACHE_DIR: /home/runner/.ccache

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y gcc g++ ccache

      - name: 创建缓存目录
        run: |
          mkdir -p $CCACHE_DIR
          touch $CCACHE_DIR/.keep

      - name: GitHub 缓存配置
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-bigcache-v1

      - name: 启用 ccache
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          ccache -z

      - name: 【重型测试】生成大文件 → 缓存直接 50MB+
        run: |
          mkdir -p bigtest
          cd bigtest
          for i in {1..300}; do
            cat > big$i.c << EOF
int a$i(int b,int c,int d,int e,int f,int g,int h) {
  long x = b+c+d+e+f+g+h;
  long y = x*2+3;
  long z = y*5+99;
  char buf[1024];
  for(int n=0;n<1024;n++) buf[n]=n%255;
  return buf[z%1024] + x + y + z;
}
int main() { return a$i(1,2,3,4,5,6,7); }
EOF
            gcc -O2 big$i.c -o big$i
          done

      - name: 查看最终缓存（一定 50MB+）
        run: |
          echo "===== CCACHE 状态 ====="
          ccache -s
          echo "===== 缓存目录大小 ====="
          du -sh $CCACHE_DIR
