name: Test CCACHE 缓存测试
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      USE_CCACHE: true
      CCACHE_DIR: ~/.ccache

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 1️⃣ 安装依赖（必须放在最前面）
        run: |
          sudo apt update
          sudo apt install -y gcc g++ ccache

      - name: 2️⃣ 创建缓存目录
        run: |
          mkdir -p $CCACHE_DIR
          touch $CCACHE_DIR/.keep

      - name: 3️⃣ 配置缓存
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-test-ccache-v1
          restore-keys: |
            ${{ runner.os }}-test-ccache-

      - name: 4️⃣ 强制启用 ccache（现在已经安装好了）
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          # 重置缓存统计
          ccache -z

      - name: 5️⃣ 【测试】大量编译 C 程序 → 强制产生缓存
        run: |
          mkdir -p test_build
          cd test_build
          for i in {1..50}; do
            echo "int main$i() { return 0; }" > test$i.c
            gcc -c test$i.c -o test$i.o
          done

      - name: 6️⃣ 查看缓存结果（重点看这里！）
        run: |
          echo "====== CCACHE 状态 ======"
          ccache -s
          echo "====== 缓存目录大小 ======"
          du -sh $CCACHE_DIR
