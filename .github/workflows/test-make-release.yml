name: 测试Release
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须给创建Release的权限
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6
        with:
          fetch-tags: true  # 必须加，才能读取历史标签
          fetch-depth: 0    # 必须加，才能获取所有tag

      # 👇 这一段就是你原来【生成版本号】的代码
      - name: 生成Releases版本标签和说明文件
        id: tag
        run: |
          YM=$(date +%Y%m)
          LAST_TAG=$(git tag | grep "^$YM-V" | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then
            NUM=1
          else
            NUM=$(echo "$LAST_TAG" | awk -F 'V' '{print $2}')
            NUM=$((NUM + 1))
          fi
          echo "release_tag=$YM_V$NUM" >> $GITHUB_OUTPUT
          # 创建发布说明文件
          touch release.txt
          # 标记标签生成成功
          echo "status=success" >> $GITHUB_OUTPUT

      # 👇 这一段是【创建Release】的代码（自动用上面生成的版本号）
      - name: 创建正式测试版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.release_tag }} \
            --title "${{ steps.tag.outputs.release_tag }}" \
            --notes "这是自动生成的测试版本"
