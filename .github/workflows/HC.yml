name: 纯缓存测试（零警告版）
on:
  workflow_dispatch:

jobs:
  test-cache:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      # 1. 先创建目录
      - name: 准备缓存目录
        run: |
          mkdir -p $HOME/.ccache
          # 关键：写入一个测试文件，避免目录为空
          echo "测试缓存数据" > $HOME/.ccache/test.log

      # 2. 缓存步骤
      - name: 测试缓存加速
        uses: actions/cache@v5
        with:
          path: $HOME/.ccache
          key: test-cache-${{ github.sha }}
          restore-keys: |
            test-cache-

      # 3. 验证缓存读取
      - name: 读取缓存测试
        run: |
          echo "✅ 缓存读取成功，文件内容："
          cat $HOME/.ccache/test.log
