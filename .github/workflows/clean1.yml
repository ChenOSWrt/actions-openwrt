name: 测试清理脚本

on:
  workflow_dispatch:

jobs:
  test-clean:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 【测试】清理旧Workflow运行记录
        if: always()
        run: bash .github/scripts/clean1.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          CLEAN_TYPE: run
          KEEP_LATEST: 10
          KEEP_DAYS: 14
          DRY_RUN: true

      - name: 【测试】清理旧Releases和Tags
        if: always()
        run: bash .github/scripts/clean1.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CLEAN_TYPE: release
          KEEP_LATEST: 10
          KEEP_DAYS: 30
          DRY_RUN: true

      - name: 【测试】清理旧Actions缓存
        if: always()
        run: bash .github/scripts/clean1.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CLEAN_TYPE: cache
          KEEP_LATEST: 15
          KEEP_DAYS: 7
          DRY_RUN: true
