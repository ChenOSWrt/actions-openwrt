# 工作流Workflows名称
name: Update

# 全局环境变量
env:
  REPO_URL: https://github.com/coolsnowwolf/lede  # 要检测的OpenWrt源码仓库地址
  REPO_BRANCH: 20251001                           # 检测的源码分支

on:
  # 允许手动点击运行
  workflow_dispatch:  
  # 定时自动检测（每18小时检查一次，目前被注释，未开启）
  #schedule:                 
  #  - cron: 0 */18 * * *

# 权限配置
permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:

    # 第一步：获取源码最新的提交版本号(Commit Hash)
    - name: Get Commit Hash
      id: getHash
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH .  # 浅克隆源码，只拉最新版本
        echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT  # 获取版本号并输出

    # 第二步：对比本次版本号与缓存中的版本号
    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v5  # 使用GitHub缓存功能
      with:
        path: .commitHash    # 缓存文件路径
        key: commitHash_${{ steps.getHash.outputs.commitHash }}  # 以版本号作为缓存key

    # 第三步：如果版本号不相同（源码有更新），保存新版本号到缓存
    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'  # 如果没有命中缓存=有更新
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash  # 保存新版本号

    # 第四步：源码有更新时，自动触发编译固件
    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'  # 源码更新才执行
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ github.token }}
        event-type: Source Code Update  # 触发事件：源码已更新（通知编译脚本开始工作）

    - name: 清理旧的Workflows运行记录
      if: always()
      run: |
        # 保留最新5条运行记录
        gh run list --workflow "${{ github.workflow }}" --limit all \
          --json databaseId -q '.[5:][] | .databaseId' \
          | while read -r id; do
              if [ -n "$id" ]; then
                echo "⚠️ 正在删除运行记录：$id"
                gh run delete "$id" || echo "❌ 删除失败：$id"
              fi
            done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
